<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AI FASHION FIRST | 参会报名</title>
    <meta name="description" content="AI FASHION FIRST — 长三角AI时尚科创峰会参会报名。2026年6月29日，杭州市 · 和盛大厦。" />
    <meta property="og:site_name" content="AI FASHION FIRST" />
    <meta property="og:title" content="AI FASHION FIRST | 参会报名" />
    <meta property="og:description" content="2026年6月29日 · 杭州 · 和盛大厦。请填写参会信息，用于参会确认、现场签到与活动联系。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zyufei822-arch.github.io/ai-fashion-first-h5/event-signup.html" />
    <meta property="og:image" content="https://zyufei822-arch.github.io/ai-fashion-first-h5/share-card.jpg" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="600" />
    <style>
      :root {
        --bg: #04070c;
        --panel: rgba(8, 15, 25, 0.82);
        --panel-soft: rgba(15, 28, 44, 0.72);
        --ice: #edf8ff;
        --blue: #9fd4ff;
        --muted: rgba(216, 235, 250, 0.66);
        --faint: rgba(216, 235, 250, 0.42);
        --line: rgba(159, 212, 255, 0.24);
        --danger: #ff9a9a;
        --ok: #9fe8c8;
        --cn: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        --en: "Arial", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: var(--bg); }
      body {
        color: var(--ice);
        font-family: var(--cn);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(circle at 18% 8%, rgba(155, 214, 255, 0.22), transparent 30%),
          radial-gradient(circle at 78% 18%, rgba(120, 160, 255, 0.16), transparent 34%),
          linear-gradient(180deg, rgba(9, 20, 35, 0.92), rgba(4, 7, 12, 1) 68%);
      }
      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        z-index: 0;
        opacity: 0.28;
        background:
          linear-gradient(115deg, transparent 0 16%, rgba(159, 212, 255, 0.26) 16.2%, transparent 16.8% 100%),
          linear-gradient(138deg, transparent 0 42%, rgba(255, 255, 255, 0.18) 42.2%, transparent 42.7% 100%),
          linear-gradient(72deg, transparent 0 62%, rgba(120, 185, 235, 0.2) 62.2%, transparent 62.8% 100%);
        transform: rotate(-6deg);
        pointer-events: none;
      }

      main {
        position: relative;
        z-index: 1;
        width: min(520px, 100%);
        min-height: 100svh;
        margin: 0 auto;
        padding: calc(26px + env(safe-area-inset-top)) 22px calc(34px + env(safe-area-inset-bottom));
        display: grid;
        align-content: center;
        gap: 18px;
      }
      .brand {
        text-align: center;
      }
      .eyebrow {
        color: #72a9ff;
        font: 800 15px/1 var(--en);
        letter-spacing: 0.28em;
        text-indent: 0.28em;
      }
      h1 {
        margin: 10px 0 0;
        font-size: clamp(36px, 10vw, 50px);
        line-height: 1.02;
        letter-spacing: 0;
      }
      .sub {
        margin: 14px auto 0;
        max-width: 390px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.85;
      }
      .meta {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        color: rgba(237, 248, 255, 0.92);
        font-size: 14px;
        line-height: 1.7;
      }
      .meta span {
        color: var(--blue);
        font-weight: 800;
        margin-right: 6px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, var(--panel-soft), var(--panel));
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34), 0 0 42px rgba(120, 185, 235, 0.1);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        padding: 20px;
      }
      form {
        display: grid;
        gap: 14px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      label em {
        font-style: normal;
        color: var(--blue);
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(6, 12, 21, 0.64);
        color: var(--ice);
        outline: none;
        min-height: 48px;
        padding: 12px 14px;
        font: 500 16px/1.4 var(--cn);
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }
      select {
        appearance: none;
        -webkit-appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%;
        background-size: 6px 6px;
        background-repeat: no-repeat;
      }
      textarea {
        min-height: 94px;
        resize: vertical;
      }
      input::placeholder,
      textarea::placeholder {
        color: rgba(216, 235, 250, 0.34);
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(159, 212, 255, 0.7);
        background: rgba(8, 17, 30, 0.78);
        box-shadow: 0 0 0 3px rgba(120, 185, 235, 0.14);
      }
      .submit {
        width: 100%;
        min-height: 54px;
        border: 1px solid rgba(190, 225, 250, 0.72);
        border-radius: 999px;
        color: #03121f;
        cursor: pointer;
        background: linear-gradient(180deg, #f2faff 0%, #b5dcf8 70%, #8cc4ec 100%);
        box-shadow: 0 0 22px rgba(140, 200, 245, 0.34), 0 0 52px rgba(90, 160, 215, 0.18);
        font: 800 18px/1 var(--cn);
        letter-spacing: 0.18em;
        text-indent: 0.18em;
      }
      .submit:disabled {
        opacity: 0.64;
        cursor: not-allowed;
      }
      .status {
        min-height: 20px;
        margin: 0;
        text-align: center;
        color: var(--faint);
        font-size: 13px;
        line-height: 1.6;
      }
      .status.is-error { color: var(--danger); }
      .status.is-success { color: var(--ok); }
      .privacy {
        margin: 0;
        color: var(--faint);
        font-size: 12px;
        line-height: 1.8;
      }
      .links {
        display: flex;
        justify-content: center;
        gap: 16px;
        color: var(--faint);
        font-size: 12px;
      }
      .links a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid rgba(159, 212, 255, 0.24);
      }
      .success {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(3, 6, 10, 0.84);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .success.is-visible {
        display: grid;
      }
      .success-box {
        width: min(380px, 100%);
        border: 1px solid rgba(159, 212, 255, 0.3);
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(16, 27, 42, 0.96), rgba(8, 14, 23, 0.96));
        padding: 34px 24px 24px;
        text-align: center;
        box-shadow: 0 0 60px rgba(90, 160, 215, 0.2);
      }
      .success-box h2 {
        margin: 0;
        font-size: 28px;
      }
      .success-box p {
        margin: 14px 0 24px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.9;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="brand" aria-label="活动信息">
        <div class="eyebrow">AI FASHION FIRST</div>
        <h1>参会报名</h1>
        <p class="sub">欢迎参加 AI FASHION FIRST — 长三角AI时尚科创峰会。请填写以下信息，便于参会确认、现场签到与活动联系。</p>
        <div class="meta">
          <div><span>时间</span>2026年6月29日（周一）09:00–16:00</div>
          <div><span>地点</span>杭州市 · 和盛大厦3号楼8楼汇报厅</div>
        </div>
      </section>

      <section class="card" aria-label="报名表单">
        <form id="eventSignupForm" novalidate>
          <div>
            <label for="name">姓名 <em>*</em></label>
            <input id="name" name="name" autocomplete="name" required placeholder="请填写姓名" />
          </div>
          <div>
            <label for="phone">联系方式 <em>*</em></label>
            <input id="phone" name="phone" inputmode="tel" autocomplete="tel" required placeholder="请填写手机号或微信" />
          </div>
          <div>
            <label for="company">公司 / 单位 <em>*</em></label>
            <input id="company" name="company" autocomplete="organization" required placeholder="请填写公司名称" />
          </div>
          <div>
            <label for="title">职位</label>
            <select id="title" name="title">
              <option value="">请选择职位（选填）</option>
              <option>创始人 / 企业负责人</option>
              <option>设计师 / 创意负责人</option>
              <option>市场部 / 品牌公关</option>
              <option>数字化 / AI负责人</option>
              <option>运营 / 供应链负责人</option>
              <option>其他</option>
            </select>
          </div>
          <div>
            <label for="attendance">参会安排 <em>*</em></label>
            <select id="attendance" name="attendance" required>
              <option value="">请选择参会安排</option>
              <option>6月29日主论坛</option>
              <option>AI Champion营深度训练营</option>
              <option>主论坛 + Champion营均有意向</option>
            </select>
          </div>
          <div>
            <label for="remark">备注</label>
            <textarea id="remark" name="remark" placeholder="可填写特殊需求或补充信息"></textarea>
          </div>
          <p class="status" id="formStatus" role="status" aria-live="polite"></p>
          <button class="submit" type="submit">提交报名</button>
          <p class="privacy">您提交的信息仅用于本次活动的参会确认、现场签到与活动联系。</p>
        </form>
      </section>

      <nav class="links" aria-label="相关链接">
        <a href="./register.html?v=final-20260614-training3">查看完整活动页</a>
        <a href="./manage.html">报名后台</a>
      </nav>
    </main>

    <div class="success" id="successOverlay" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <div class="success-box">
        <h2 id="successTitle">报名已提交</h2>
        <p>感谢您关注 AI FASHION FIRST — 长三角AI时尚科创峰会。期待与您在杭州见面。</p>
        <button class="submit" type="button" id="successClose">返回</button>
      </div>
    </div>

    <script src="./config.js?v=20260610-final"></script>
    <script>
      (function () {
        const config = window.AIFF_CONFIG || {};
        const form = document.getElementById("eventSignupForm");
        const status = document.getElementById("formStatus");
        const overlay = document.getElementById("successOverlay");
        const closeButton = document.getElementById("successClose");

        function setStatus(message, type) {
          status.textContent = message || "";
          status.classList.toggle("is-error", type === "error");
          status.classList.toggle("is-success", type === "success");
        }

        function buildPayload(data) {
          const remarkParts = [
            "报名来源：独立参会报名链接",
            data.remark ? "备注：" + data.remark : "",
          ].filter(Boolean);

          return {
            name: data.name,
            phone: data.phone,
            company: data.company,
            title: data.title || "未填写",
            identity: "独立报名链接",
            attendance: data.attendance,
            remark: remarkParts.join("\n"),
            sourceEvent: "AI FASHION FIRST",
            status: "new",
            createdAt: new Date().toISOString(),
          };
        }

        window.__buildEventSignupPayload = buildPayload;

        async function submitRegistration(payload) {
          if (!config.apiBase) {
            const local = JSON.parse(localStorage.getItem("aiff_registrations") || "[]");
            local.unshift(payload);
            localStorage.setItem("aiff_registrations", JSON.stringify(local));
            return;
          }

          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 8000);
          try {
            const response = await fetch(config.apiBase + "/register", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
              signal: controller.signal,
            });
            const result = await response.json();
            if (!response.ok || !result.ok) {
              throw new Error(result.error || "提交失败，请稍后再试");
            }
          } catch (error) {
            throw new Error(error.name === "AbortError" ? "提交超时，请检查网络后重试" : (error.message || "提交失败，请稍后再试"));
          } finally {
            clearTimeout(timer);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          setStatus("");
          if (!form.reportValidity()) {
            setStatus("请先补全必填信息。", "error");
            return;
          }

          const button = form.querySelector("button[type='submit']");
          const originalText = button.textContent;
          const data = Object.fromEntries(new FormData(form).entries());
          Object.keys(data).forEach((key) => {
            if (typeof data[key] === "string") data[key] = data[key].trim();
          });

          button.disabled = true;
          button.textContent = "提交中...";
          setStatus("正在提交报名信息，请稍候。");
          try {
            await submitRegistration(buildPayload(data));
            form.reset();
            setStatus("报名信息已提交。", "success");
            overlay.classList.add("is-visible");
            document.body.style.overflow = "hidden";
          } catch (error) {
            setStatus(error.message || "提交失败，请稍后再试。", "error");
          } finally {
            button.disabled = false;
            button.textContent = originalText;
          }
        });

        form.addEventListener("input", () => {
          if (status.classList.contains("is-error")) setStatus("");
        });

        closeButton.addEventListener("click", () => {
          overlay.classList.remove("is-visible");
          document.body.style.overflow = "";
        });
      })();
    </script>
  </body>
</html>
