    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const manifest = JSON.parse(manifestEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with

    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    }

r {\n    content: \"\"; width: 1px; height: 22px;\n    background: linear-gradient(180deg, rgba(159,212,255,0.8), rgba(159,212,255,0));\n  }\n\n  /* ---------- 按钮 ---------- */\n  .cta-primary {\n    display: flex; align-items: center; justify-content: center;\n    min-height: 52px; border: none; border-radius: 4px; cursor: pointer;\n    font: 700 16px/1 var(--cn); letter-spacing: 0.18em; text-indent: 0.18em;\n    color: #03121f;\n    background: linear-gradient(180deg, #f2faff 0%, #b5dcf8 70%, #8cc4ec 100%);\n    box-shadow: 0 0 22px rgba(140, 200, 245, 0.4), 0 0 60px rgba(90, 160, 215, 0.22);\n    transition: transform 0.18s ease, box-shadow 0.18s ease;\n  }\n  .cta-primary:active { transform: scale(0.98); box-shadow: 0 0 12px rgba(140, 200, 245, 0.3); }\n  .cta-primary[disabled] { opacity: 0.65; }\n  .cta-ghost {\n    display: flex; align-items: center; justify-content: center;\n    min-height: 52px; border-radius: 4px; cursor: pointer;\n    font: 500 14px/1 var(--cn); letter-spacing: 0.18em; text-indent: 0.18em;\n    color: var(--ice); background: rgba(10, 20, 32, 0.35);\n    border: 1px solid rgba(190, 225, 250, 0.38);\n    backdrop-filter: blur(6px);\n    transition: transform 0.18s ease;\n  }\n  .cta-ghost:active { transform: scale(0.98); }\n\n  /* ---------- 通用区块 ---------- */\n  .block { padding: 64px 28px 56px; border-top: 1px solid rgba(159, 212, 255, 0.1); }\n  .kicker { font: 600 10px/1 var(--en); letter-spacing: 0.42em; color: var(--glow); text-transform: uppercase; }\n  .block-title { margin: 14px 0 0; font-size: 24px; font-weight: 900; letter-spacing: 0.06em; line-height: 1.35; }\n  .block-lead { margin: 12px 0 0; font-size: 13px; line-height: 1.9; color: var(--steel); }\n\n  /* ---------- 日程 ---------- */\n  .agenda-list { margin-top: 28px; border-left: 1px solid var(--hairline); }\n  .agenda-item { position: relative; padding: 0 0 24px 22px; }\n  .agenda-item:last-child { padding-bottom: 0; }\n  .agenda-item::before {\n    content: \"\"; position: lledby=\"successTitle\">\n  <div class=\"success-card\">\n    <div class=\"success-mark en\">✓<\u002Fdiv>\n    <h2 id=\"successTitle\">报名已提交<\u002Fh2>\n    <p>感谢您关注 AI FASHION FIRST — 长三角AI时尚科创峰会。主办单位将尽快确认参会信息，期待与您在杭州见面。<\u002Fp>\n    <button class=\"cta-primary\" type=\"button\" id=\"successClose\">返回首页<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"7c825283-5039-4b07-8dd9-02d5422ea075\"><\u002Fscript>\n<script>\nwindow.AIFF_CONFIG = {\n  apiBase: \"https://ai-fashion-first-d2eippg6bd7136a-1304462481.ap-shanghai.app.tcloudbase.com/h5\",\n};\n<\u002Fscript>\n<script>\n(function () {\n  const config = window.AIFF_CONFIG || {};\n  const form = document.getElementById(\"registrationForm\");\n  const formStatus = document.getElementById(\"formStatus\");\n  const overlay = document.getElementById(\"successOverlay\");\n  const dockButtons = document.querySelectorAll(\".dock button\");\n\n  // ---- 锚点滚动 ----\n  function go(id) {\n    const target = document.getElementById(id);\n    if (!target) return;\n    const top = target.getBoundingClientRect().top + window.scrollY;\n    window.scrollTo({ top: id === \"home\" ? 0 : top - 8, behavior: \"smooth\" });\n  }\n  document.querySelectorAll(\"[data-go]\").forEach(function (btn) {\n    btn.addEventListener(\"click\", function () { go(btn.dataset.go); });\n  });\n\n  const championApplyBtn = document.getElementById(\"championApplyBtn\");\n  if (championApplyBtn) {\n    championApplyBtn.addEventListener(\"click\", function (event) {\n      const targetLink = championApplyBtn.dataset.link;\n      if (targetLink) return;\n      event.preventDefault();\n      go(\"form\");\n      const attendance = document.getElementById(\"f-attendance\");\n      if (attendance) attendance.value = \"AI Champion营深度训练营\";\n    });\n  }\n\n  // ---- 滚动入场 ----\n  const revealObserver = new IntersectionObserver(function (entries) {\n    entries.forEach(function (entry) {\n      if (entry.isIntersecting) {\n        entry.target.classList.add(\"is-in\");\n        revealObserver.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.12 });\n  document.querySelectorAll(\".reveal\").forEach(function (el) { revealObserver.observe(el); });\n\n  // ---- 底部导航高亮 ----\n  const navTargets = [\"home\", \"agenda\", \"form\"];\n  const navObserver = new IntersectionObserver(function (entries) {\n    const visible = entries\n      .filter(function (e) { return e.isIntersecting; })\n      .sort(function (a, b) { return b.intersectionRatio - a.intersectionRatio; })[0];\n    if (!visible) return;\n    let id = visible.target.id;\n    if (id === \"plan\") id = \"agenda\";\n    if (id === \"share\") id = \"form\";\n    dockButtons.forEach(function (btn) {\n      btn.classList.toggle(\"active\", btn.dataset.go === id);\n    });\n  }, { threshold: [0.4, 0.6] });\n  [\"home\", \"agenda\", \"plan\", \"form\", \"share\"].forEach(function (id) {\n    const el = document.getElementById(id);\n    if (el) navObserver.observe(el);\n  });\n\n  // ---- 复制链接 ----\n  const copyBtn = document.getElementById(\"copyLinkBtn\");\n  copyBtn.addEventListener(\"click\", async function () {\n    const url = location.href.split(\"#\")[0];\n    let ok = false;\n    try {\n      await navigator.clipboard.writeText(url);\n      ok = true;\n    } catch (err) {\n      const ta = document.createElement(\"textarea\");\n      ta.value = url;\n      document.body.appendChild(ta);\n      ta.select();\n      try { ok = document.execCommand(\"copy\"); } catch (e2) { ok = false; }\n      ta.remove();\n    }\n    const original = copyBtn.textContent;\n    copyBtn.textContent = ok ? \"链接已复制\" : \"复制失败，请手动复制\";\n    setTimeout(function () { copyBtn.textContent = original; }, 2200);\n  });\n\n  // ---- 表单 ----\n  function setFormStatus(message, type) {\n    formStatus.textContent = message || \"\";\n    formStatus.classList.toggle(\"is-error\", type === \"error\");\n    formStatus.classList.toggle(\"is-success\", type === \"success\");\n  }\n\n  async function submitRegistration(data) {\n    if (!config.apiBase) throw new Error(\"提交地址未配置，请联系主办单位\");\n    const controller = new AbortController();\n    const timer = setTimeout(function () { controller.abort(); }, 8000);\n    try {\n      const response = await fetch(config.apiBase + \"/register\", {\n        method: \"POST\",\n        headers: { \"content-type\": \"application/json\" },\n        body: JSON.stringify(data),\n        signal: controller.signal,\n      });\n      const payload = await response.json();\n      if (!response.ok || !payload.ok) {\n        throw new Error(payload.error || \"提交失败，请稍后再试\");\n      }\n    } catch (error) {\n      throw new Error(error.name === \"AbortError\" ? \"提交超时，请检查网络后重试\" : error.message || \"提交失败，请稍后再试\");\n    } finally {\n      clearTimeout(timer);\n    }\n  }\n\n  function getRegistrationData(formEl) {\n    const data = Object.fromEntries(new FormData(formEl).entries());\n    Object.keys(data).forEach(function (key) {\n      if (typeof data[key] === \"string\") data[key] = data[key].trim();\n    });\n    return data;\n  }\n\n  function validateRegistration(data) {\n    const required = [[\"name\", \"姓名\"], [\"phone\", \"手机号\"], [\"company\", \"公司 / 单位\"], [\"attendance\", \"参会安排\"]];\n    for (let i = 0; i < required.length; i++) {\n      if (!data[required[i][0]]) throw new Error(\"请填写\" + required[i][1]);\n    }\n  }\n\n  form.addEventListener(\"submit\", async function (event) {\n    event.preventDefault();\n    setFormStatus(\"\");\n    if (!form.reportValidity()) {\n      setFormStatus(\"请先补全必填信息。\", \"error\");\n      return;\n    }\n    const submitButton = form.querySelector(\"button[type='submit']\");\n    const originalText = submitButton.textContent;\n    submitButton.disabled = true;\n    submitButton.setAttribute(\"aria-busy\", \"true\");\n    submitButton.textContent = \"提交中…\";\n    setFormStatus(\"正在提交报名信息，请稍候。\");\n    try {\n      const data = getRegistrationData(form);\n      validateRegistration(data);\n      await submitRegistration(data);\n      setFormStatus(\"报名信息已提交。\", \"success\");\n      form.reset();\n      overlay.classList.add(\"is-visible\");\n      document.body.style.overflow = \"hidden\";\n    } catch (error) {\n      setFormStatus(error.message || \"提交失败，请稍后再试。\", \"error\");\n    } finally {\n      submitButton.disabled = false;\n      submitButton.removeAttribute(\"aria-busy\");\n      submitButton.textContent = originalText;\n    }\n  });\n\n  form.addEventListener(\"input\", function () {\n    if (formStatus.classList.contains(\"is-error\")) setFormStatus(\"\");\n  });\n  form.addEventListener(\"invalid\", function () {\n    setFormStatus(\"请先补全必填信息。\", \"error\");\n  }, true);\n\n  document.getElementById(\"successClose\").addEventListener(\"click\", function () {\n    overlay.classList.remove(\"is-visible\");\n    document.body.style.overflow = \"\";\n    go(\"home\");\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
