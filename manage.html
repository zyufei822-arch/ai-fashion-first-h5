<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI FASHION FIRST 报名后台</title>
    <style>
      :root {
        --ink: #111318;
        --muted: #68707c;
        --line: rgba(18, 24, 34, 0.1);
        --blue: #2566f2;
        --panel: rgba(255, 255, 255, 0.76);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 24% 10%, rgba(91, 197, 255, 0.2), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
      }

      main {
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 28px 18px 42px;
      }

      .brand {
        color: var(--blue);
        font-size: 12px;
        letter-spacing: 0.16em;
        font-weight: 800;
        text-align: center;
      }

      h1 {
        margin: 10px 0 22px;
        text-align: center;
        font-size: 30px;
        line-height: 1.1;
      }

      .panel,
      .record,
      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
      }

      .panel {
        padding: 16px;
        margin-bottom: 14px;
      }

      .login {
        display: grid;
        gap: 10px;
      }

      input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        padding: 0 16px;
        font: inherit;
        outline: none;
      }

      button,
      .link-button {
        min-height: 44px;
        border: 1px solid rgba(37, 102, 242, 0.32);
        border-radius: 999px;
        color: #1748b8;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(224, 238, 255, 0.42)),
          rgba(255, 255, 255, 0.48);
        box-shadow:
          0 14px 28px rgba(31, 104, 255, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.82);
        font: inherit;
        font-weight: 760;
        text-decoration: none;
        display: inline-grid;
        place-items: center;
        padding: 0 16px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        padding: 14px;
      }

      .stat strong {
        display: block;
        font-size: 26px;
      }

      .stat span {
        color: var(--muted);
        font-size: 12px;
      }

      .toolbar {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .records {
        display: grid;
        gap: 10px;
      }

      .record {
        padding: 14px;
      }

      .record-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .record-head strong {
        font-size: 16px;
      }

      .record-head span,
      .record p {
        color: var(--muted);
        font-size: 12px;
      }

      .record p {
        margin: 0;
        line-height: 1.7;
      }

      .empty,
      .status {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        text-align: center;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">AI FASHION FIRST</div>
      <h1>报名后台</h1>

      <section class="panel login" id="loginPanel">
        <input id="passwordInput" type="password" placeholder="输入管理密码" />
        <button id="loginButton" type="button">进入后台</button>
        <div class="status" id="loginStatus">请输入管理密码查看报名数据。</div>
      </section>

      <section id="adminPanel" hidden>
        <div class="stats">
          <div class="stat"><strong id="totalCount">0</strong><span>总报名人数</span></div>
          <div class="stat"><strong id="todayCount">0</strong><span>今日新增</span></div>
        </div>

        <div class="toolbar">
          <input id="searchInput" placeholder="搜索姓名 / 公司 / 手机号" />
          <div class="actions">
            <button id="exportButton" type="button">导出 CSV</button>
            <button id="copyButton" type="button">复制给 Codex</button>
          </div>
        </div>

        <div class="records" id="records"></div>
        <div class="empty" id="empty" hidden>还没有报名记录。</div>
      </section>
    </main>

    <script src="./config.js?v=20260610-final"></script>
    <script>
      const config = window.AIFF_CONFIG || {};
      const state = {
        password: sessionStorage.getItem("aiff_admin_password") || "",
        rows: [],
        filtered: [],
      };

      const loginPanel = document.querySelector("#loginPanel");
      const adminPanel = document.querySelector("#adminPanel");
      const passwordInput = document.querySelector("#passwordInput");
      const loginButton = document.querySelector("#loginButton");
      const loginStatus = document.querySelector("#loginStatus");
      const searchInput = document.querySelector("#searchInput");
      const records = document.querySelector("#records");
      const empty = document.querySelector("#empty");
      const totalCount = document.querySelector("#totalCount");
      const todayCount = document.querySelector("#todayCount");

      passwordInput.value = state.password;

      function todayKey() {
        return new Date().toISOString().slice(0, 10);
      }

      function localRows() {
        return JSON.parse(localStorage.getItem("aiff_registrations") || "[]");
      }

      function csvCell(value) {
        const text = String(value ?? "").trim();
        return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      }

      function localCsv(rows) {
        const headers = [
          ["name", "姓名"],
          ["company", "公司"],
          ["title", "职务"],
          ["phone", "联系方式"],
          ["attendance", "参会安排"],
          ["remark", "备注"],
          ["createdAt", "提交时间"],
          ["sourceEvent", "来源活动"],
          ["status", "状态"],
        ];
        return `\uFEFF${[
          headers.map(([, label]) => label).join(","),
          ...rows.map((row) => headers.map(([key]) => csvCell(row[key])).join(",")),
        ].join("\n")}`;
      }

      async function api(path, options = {}) {
        if (!config.apiBase) {
          return { ok: true, data: localRows() };
        }
        const response = await fetch(`${config.apiBase}${path}`, {
          ...options,
          headers: {
            "content-type": "application/json",
            "x-admin-password": state.password,
            ...(options.headers || {}),
          },
        });
        if (path === "/admin/export") {
          if (!response.ok) throw new Error("导出失败，请检查管理密码");
          return response.text();
        }
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "请求失败");
        }
        return payload;
      }

      function applyFilter() {
        const keyword = searchInput.value.trim().toLowerCase();
        state.filtered = keyword
          ? state.rows.filter((row) =>
              [row.name, row.company, row.title, row.phone, row.attendance, row.remark]
                .join(" ")
                .toLowerCase()
                .includes(keyword)
            )
          : [...state.rows];
        render();
      }

      function render() {
        totalCount.textContent = state.rows.length;
        todayCount.textContent = state.rows.filter((row) =>
          String(row.createdAt || "").startsWith(todayKey())
        ).length;

        records.innerHTML = "";
        empty.hidden = state.filtered.length > 0;
        state.filtered.forEach((row) => {
          const node = document.createElement("article");
          node.className = "record";
          node.innerHTML = `
            <div class="record-head">
              <strong>${row.name || ""}</strong>
              <span>${String(row.createdAt || "").slice(0, 16).replace("T", " ")}</span>
            </div>
            <p>${row.company || ""} · ${row.title || "职务未填"}</p>
            <p>${row.phone || ""} · ${row.attendance || ""}</p>
            ${row.remark ? `<p>${row.remark}</p>` : ""}
          `;
          records.appendChild(node);
        });
      }

      async function loadRows() {
        loginStatus.textContent = "读取中...";
        const payload = await api("/admin/list");
        state.rows = payload.data || [];
        state.filtered = [...state.rows];
        sessionStorage.setItem("aiff_admin_password", state.password);
        loginPanel.hidden = true;
        adminPanel.hidden = false;
        loginStatus.textContent = "";
        render();
      }

      loginButton.addEventListener("click", async () => {
        state.password = passwordInput.value.trim();
        try {
          await loadRows();
        } catch (error) {
          loginStatus.textContent = error.message || "登录失败";
        }
      });

      searchInput.addEventListener("input", applyFilter);

      document.querySelector("#exportButton").addEventListener("click", async () => {
        const csv = config.apiBase ? await api("/admin/export") : localCsv(state.rows);
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "ai-fashion-first-registrations.csv";
        link.click();
        URL.revokeObjectURL(url);
      });

      document.querySelector("#copyButton").addEventListener("click", async () => {
        const text = JSON.stringify(state.filtered, null, 2);
        await navigator.clipboard.writeText(text);
        alert("已复制报名数据，可以发给 Codex 建人员档案。");
      });

      if (state.password) {
        loadRows().catch(() => {});
      }
    </script>
  </body>
</html>
